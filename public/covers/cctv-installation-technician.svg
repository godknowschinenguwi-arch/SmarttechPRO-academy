<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#142457"/><stop offset="1" stop-color="#0d1836"/>
    </linearGradient>
    <radialGradient id="glowO" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.55"/><stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3380ff" stop-opacity="0.5"/><stop offset="1" stop-color="#3380ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <circle cx="700" cy="70" r="220" fill="url(#glowO)"/>
  <circle cx="90" cy="400" r="200" fill="url(#glowB)"/>
  
  <g transform="translate(250,110)">
    <!-- wall bracket -->
    <rect x="20" y="70" width="14" height="60" rx="4" fill="#cadcfc" fill-opacity="0.3"/>
    <rect x="8" y="120" width="40" height="14" rx="4" fill="#cadcfc" fill-opacity="0.3"/>
    <!-- camera body -->
    <g transform="rotate(-12 120 90)">
      <rect x="60" y="60" width="150" height="60" rx="18" fill="#ffffff"/>
      <rect x="60" y="60" width="150" height="60" rx="18" fill="#3380ff" fill-opacity="0.08"/>
      <circle cx="205" cy="90" r="34" fill="#0d1836"/>
      <circle cx="205" cy="90" r="26" fill="#1a3a86"/>
      <circle cx="205" cy="90" r="14" fill="#3380ff"/>
      <circle cx="199" cy="84" r="5" fill="#ffffff" fill-opacity="0.8"/>
      <rect x="150" y="46" width="30" height="10" rx="4" fill="#cadcfc" fill-opacity="0.5"/>
    </g>
    <!-- signal waves -->
    <g stroke="#f97316" stroke-width="5" fill="none" stroke-linecap="round">
      <path d="M250 40 q28 26 0 52" opacity="0.9"/>
      <path d="M268 26 q46 42 0 84" opacity="0.6"/>
      <path d="M286 12 q64 58 0 116" opacity="0.35"/>
    </g>
    <!-- record dot -->
    <circle cx="92" cy="80" r="7" fill="#f97316"/>
  </g>
  <g>
    <rect x="32" y="386" width="175.2" height="32" rx="16" fill="#ffffff" fill-opacity="0.12"/>
    <text x="48" y="407" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#cadcfc" letter-spacing="1">Security Systems</text>
  </g>
  <text x="768" y="410" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff" fill-opacity="0.35" letter-spacing="1">SMARTTECH ACADEMY</text>
</svg>