<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#142457"/><stop offset="1" stop-color="#0d1836"/>
    </linearGradient>
    <radialGradient id="glowO" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.55"/><stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3380ff" stop-opacity="0.5"/><stop offset="1" stop-color="#3380ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <circle cx="700" cy="70" r="220" fill="url(#glowO)"/>
  <circle cx="90" cy="400" r="200" fill="url(#glowB)"/>
  
  <g transform="translate(250,90)">
    <!-- axes -->
    <line x1="20" y1="30" x2="20" y2="200" stroke="#cadcfc" stroke-opacity="0.4" stroke-width="3"/>
    <line x1="20" y1="200" x2="300" y2="200" stroke="#cadcfc" stroke-opacity="0.4" stroke-width="3"/>
    <!-- bars -->
    <g>
      <rect x="45" y="150" width="34" height="50" rx="4" fill="#3380ff" fill-opacity="0.55"/>
      <rect x="95" y="120" width="34" height="80" rx="4" fill="#3380ff" fill-opacity="0.7"/>
      <rect x="145" y="85" width="34" height="115" rx="4" fill="#3380ff"/>
      <rect x="195" y="55" width="34" height="145" rx="4" fill="#f97316"/>
    </g>
    <!-- trend arrow -->
    <path d="M40 165 L110 130 L160 95 L250 40" fill="none" stroke="#fdba74" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M250 40 l-26 4 l14 20 z" fill="#fdba74"/>
    <!-- briefcase -->
    <g transform="translate(230,150)">
      <rect x="0" y="18" width="90" height="62" rx="10" fill="#ffffff"/>
      <rect x="30" y="6" width="30" height="18" rx="6" fill="none" stroke="#ffffff" stroke-width="6"/>
      <rect x="0" y="40" width="90" height="12" fill="#f97316"/>
      <rect x="38" y="42" width="14" height="8" rx="2" fill="#142457"/>
    </g>
  </g>
  <g>
    <rect x="32" y="386" width="166" height="32" rx="16" fill="#ffffff" fill-opacity="0.12"/>
    <text x="48" y="407" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#cadcfc" letter-spacing="1">Business Skills</text>
  </g>
  <text x="768" y="410" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff" fill-opacity="0.35" letter-spacing="1">SMARTTECH ACADEMY</text>
</svg>