<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#142457"/><stop offset="1" stop-color="#0d1836"/>
    </linearGradient>
    <radialGradient id="glowO" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.55"/><stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3380ff" stop-opacity="0.5"/><stop offset="1" stop-color="#3380ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <circle cx="700" cy="70" r="220" fill="url(#glowO)"/>
  <circle cx="90" cy="400" r="200" fill="url(#glowB)"/>
  
  <g transform="translate(250,90)">
    <!-- connections -->
    <g stroke="#3380ff" stroke-width="3" opacity="0.55">
      <line x1="150" y1="110" x2="40" y2="30"/><line x1="150" y1="110" x2="260" y2="30"/>
      <line x1="150" y1="110" x2="20" y2="180"/><line x1="150" y1="110" x2="280" y2="180"/>
      <line x1="150" y1="110" x2="150" y2="215"/>
    </g>
    <!-- outer nodes -->
    <g>
      <circle cx="40" cy="30" r="20" fill="#1a3a86" stroke="#3380ff" stroke-width="3"/>
      <circle cx="260" cy="30" r="20" fill="#1a3a86" stroke="#3380ff" stroke-width="3"/>
      <circle cx="20" cy="180" r="20" fill="#1a3a86" stroke="#f97316" stroke-width="3"/>
      <circle cx="280" cy="180" r="20" fill="#1a3a86" stroke="#3380ff" stroke-width="3"/>
      <circle cx="150" cy="215" r="20" fill="#1a3a86" stroke="#3380ff" stroke-width="3"/>
    </g>
    <!-- central switch -->
    <rect x="95" y="80" width="110" height="60" rx="12" fill="#ffffff"/>
    <circle cx="150" cy="110" r="16" fill="#f97316"/>
    <g fill="#142457"><circle cx="118" cy="130" r="4"/><circle cx="134" cy="130" r="4"/><circle cx="166" cy="130" r="4"/><circle cx="182" cy="130" r="4"/></g>
  </g>
  <g>
    <rect x="32" y="386" width="120" height="32" rx="16" fill="#ffffff" fill-opacity="0.12"/>
    <text x="48" y="407" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#cadcfc" letter-spacing="1">Networking</text>
  </g>
  <text x="768" y="410" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff" fill-opacity="0.35" letter-spacing="1">SMARTTECH ACADEMY</text>
</svg>